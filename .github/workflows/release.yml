name: Upload Release Asset

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Darwin builds
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          # Linux builds
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: ppc64le
            runner: ubuntu-24.04-ppc64le
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - run: go version

      - name: Build Go binary for ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: ai-services
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          make binary GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: ai-services-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ai-services/bin/ai-services-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          # Move all binaries to release-assets directory and create checksums
          find ./artifacts -type f -name "ai-services-*" -exec cp {} ./release-assets/ \;
          cd ./release-assets
          sha256sum ai-services-* > checksums.txt
          ls -lh

      - name: Get the target release version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: true
          generate_release_notes: true
          body: |
            ## AI Services Release ${{ steps.get_version.outputs.VERSION }}
            
            ### Binaries
            This release includes pre-built binaries for multiple platforms:
            
            **macOS:**
            - `ai-services-darwin-amd64` - Intel-based Macs
            - `ai-services-darwin-arm64` - Apple Silicon Macs (M1/M2/M3)
            
            **Linux:**
            - `ai-services-linux-amd64` - x86_64 Linux
            - `ai-services-linux-ppc64le` - PowerPC 64-bit Little Endian Linux (Podman runtime supported)
            - `ai-services-linux-arm64` - ARM64 Linux
            
            ### Platform Support
            - **Podman runtime**: Only supported on `linux/ppc64le`
            - **OpenShift runtime**: Supported on all platforms
            
            ### Verification
            Download `checksums.txt` to verify the integrity of the binaries:
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            ./release-assets/*
