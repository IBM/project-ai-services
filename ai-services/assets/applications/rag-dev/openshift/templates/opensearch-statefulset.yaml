apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "opensearch"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    ai-services.io/component: vectordb
spec:
  serviceName: "opensearch"
  replicas: {{ .Values.opensearch.replicas | default 3 }}
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: vectordb
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
        ai-services.io/component: vectordb
    spec:
      containers:
        - name: opensearch
          image: "{{ .Values.opensearch.image }}"
          env:
            - name: "cluster.name"
              value: "opensearch-cluster"
            - name: "node.name"
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: "discovery.seed_hosts"
              value: "opensearch-0.opensearch,opensearch-1.opensearch,opensearch-2.opensearch"
            - name: "cluster.initial_master_nodes"
              value: "opensearch-0,opensearch-1,opensearch-2"
            - name: "network.host"
              value: "0.0.0.0"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: password
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms4g -Xmx4g -XX:MaxDirectMemorySize=2g -XX:-UseSuperWord -XX:TieredStopAtLevel=1"
            - name: OPENSEARCH_NUM_SHARDS
              value: {{ .Values.opensearch.numShards | default 3 | quote }}
            - name: OPENSEARCH_NUM_REPLICAS
              value: {{ .Values.opensearch.numReplicas | default 2 | quote }}
          ports:
            - name: os-client-port
              containerPort: 9200
            - name: os-metrics-port
              containerPort: 9600
          resources:
            requests:
              cpu: "2"
              memory: "{{ .Values.opensearch.memoryLimit }}"
            limits:
              cpu: "2"
              memory: "{{ .Values.opensearch.memoryLimit }}"
          volumeMounts:
            - mountPath: /usr/share/opensearch/data
              name: data
          livenessProbe:
            exec:
              command:
              - sh
              - -c
              - 'curl -fk -u "admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" https://localhost:9200/_cluster/health'
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
              - sh
              - -c
              - 'curl -fk -u "admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" https://localhost:9200/_cluster/health'
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          ai-services.io/application: {{ .Release.Name }}
          ai-services.io/template: {{ .Chart.Name }}
          ai-services.io/version: {{ default .Chart.AppVersion | quote }}
          ai-services.io/component: vectordb
      spec:
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: "{{ .Values.opensearch.storage }}"
