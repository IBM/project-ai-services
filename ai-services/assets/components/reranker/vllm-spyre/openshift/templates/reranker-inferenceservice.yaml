apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: reranker
  annotations:
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    networking.kserve.io/visibility: cluster-local
    ai-services.io/component: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: Recreate
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      env:
        - name: VLLM_SPYRE_WARMUP_BATCH_SIZES
          value: "4"
        - name: VLLM_SPYRE_WARMUP_PROMPT_LENS
          value: "1024"
        - name: VLLM_SPYRE_USE_CHUNKED_PREFILL
          value: "0"
      resources:
        requests:
          cpu: {{ .Values.reranker.resources.requests.cpu | quote }}
          memory: {{ .Values.reranker.resources.requests.memory | quote }}
          ibm.com/spyre_pf: {{ index .Values.reranker.resources.requests "ibm.com/spyre_pf" | quote }}
        limits:
          cpu: {{ .Values.reranker.resources.limits.cpu | quote }}
          memory: {{ .Values.reranker.resources.limits.memory | quote }}
          ibm.com/spyre_pf: {{ index .Values.reranker.resources.limits "ibm.com/spyre_pf" | quote }}
      runtime: spyre-temp
      storageUri: {{ .Values.reranker.storageUri }}
      args:
        - --served-model-name={{ .Values.reranker.model.name }}
        - -tp 1
