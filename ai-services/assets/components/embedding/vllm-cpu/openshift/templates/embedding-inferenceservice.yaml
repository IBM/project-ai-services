apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: embedding
  annotations:
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    networking.kserve.io/visibility: cluster-local
    ai-services.io/component: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: Recreate
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      resources:
        requests:
          cpu: {{ .Values.embedding.resources.requests.cpu | quote }}
          memory: {{ .Values.embedding.resources.requests.memory | quote }}
        limits:
          cpu: {{ .Values.embedding.resources.limits.cpu | quote }}
          memory: {{ .Values.embedding.resources.limits.memory | quote }}
      runtime: cpu-temp
      storageUri: {{ .Values.embedding.storageUri }}
      args:
        - --served-model-name={{ .Values.embedding.model.name }}
        - --max-model-len={{ .Values.embedding.model.maxModelLen }}
