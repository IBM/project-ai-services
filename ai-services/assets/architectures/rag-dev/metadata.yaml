# Architecture identification
id: rag-dev
name: "Digital Assistant (Dev)"
description: "Development version of Digital Assistant using CPU-based reranker for Retrieval-Augmented Generation (RAG), including AI services that query a managed knowledge base to answer questions from custom documents and data."
version: "1.0.0"
type: architecture

# Certification and support
certified_by: "IBM"
supported_runtimes:
  - podman

# Service composition (version is optional, uses latest if not specified)
services:
  - id: chat-dev
    version: ">=1.0.0"
    
  - id: digitize
    version: ">=1.0.0"
  
  - id: summarize
    version: ">=1.0.0"
    optional: true

# Links
demo_link: "https://example.com/demo/rag-dev"
code_link: "https://github.com/project-ai-services/spyre-rag"
documentation_link: "https://docs.example.com/rag-dev"

