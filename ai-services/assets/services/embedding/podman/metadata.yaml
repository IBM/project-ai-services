name: embedding
version: "1.0.0"
runtime: podman

# Resource requirements for Podman runtime
requirements:
  min_cpu: "4"
  min_memory: "8Gi"
  min_disk: "20Gi"

# Pod template execution order
pod_templates:
  - name: embedding-server
    template: embedding-server.yaml.tmpl
    wait_for_ready: true
    readiness_timeout: 120s

