digitize:
  image: icr.io/ai-services-cicd/digitize-service:v0.0.32
  log_level: "INFO"
  database: "digitize_metadata"
  numShards: 1
  resources:
    requests:
      cpu: "16"
      memory: "50Gi"
    limits:
      cpu: "16"
      memory: "50Gi"

digitizeUi:
  image: icr.io/ai-services-cicd/digitize-ui:v0.0.26
  resources:
    requests:
      cpu: "50m"
      memory: "512Mi"
    limits:
      cpu: "50m"
      memory: "512Mi"

postgres:
  image: icr.io/ai-services-cicd/postgres:18-4
  storage: 5Gi
  password: "Aiservicesdb@1234"

embedding:
  model:
    name: ""
    maxModelLen: 512

llm:
  model:
    name: ""
    maxModelLen: 4096
    maxBatchSize: 32
  apiKey: ""

opensearch:
  auth:
    username: "admin"
    password: ""
