# Service identification
id: digitize
name: "Digitize Documents"
description: "Transforms documents such as manuals, invoices, and more into texts"
type: service

# Certification and support
certified_by: "IBM"

# Service belongs to these architectures
architectures:
  - rag

# Dependencies on other components
dependencies:
  - id: vector_store
  - id: embedding
  - id: llm

# Made with Bob

# Resource requirements (UI + Backend)
resources:
  cpu: 16 # 50m (UI) + 16 (Backend) = ~16 cores
  memory: 51712 # 512Mi (UI) + 50Gi (Backend) = 50.5Gi in MB
