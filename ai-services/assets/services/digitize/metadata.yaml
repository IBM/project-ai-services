# Service identification
id: digitize
name: "Digitize Documents"
description: "Transforms documents such as manuals, invoices, and more into texts"
type: service

# Certification and support
certified_by: "IBM"

# Service belongs to these architectures
architectures:
  - rag

# Dependencies on other services (version is optional, uses latest if not specified)
dependencies:
  - id: opensearch
    version: ">=1.0.0"
  - id: instruct
    version: ">=1.0.0"
  - id: embedding
    version: ">=1.0.0"

