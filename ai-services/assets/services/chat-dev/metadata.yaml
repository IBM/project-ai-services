# Service identification
id: chat-dev
name: "Question and Answer (Dev)"
description: "Development version - Answer questions in natural language by sourcing general & domain-specific knowledge using CPU-based reranker"
type: service

# Certification and support
certified_by: "IBM"

# Service belongs to these architectures
architectures:
  - rag-dev

# Dependencies on other services (version is optional, uses latest if not specified)
dependencies:
  - id: opensearch
    version: ">=1.0.0"
  - id: embedding
    version: ">=1.0.0"
  - id: instruct
    version: ">=1.0.0"
  - id: reranker-cpu
    version: ">=1.0.0"

