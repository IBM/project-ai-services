pods:
  - name: "chat-bot--{{ .AppSlug }}"
    format: "index .Ports \"3000/tcp\" 0"
    default: ""
    alias: UI_PORT

  - name: "chat-bot--{{ .AppSlug }}"
    format: "index .Ports \"5000/tcp\" 0"
    default: ""
    alias: BACKEND_PORT

containers:
  - name: "chat-bot--{{ .AppSlug }}-ui"
    format: ".Status"
    alias: UI_STATUS

  - name: "chat-bot--{{ .AppSlug }}-backend-server"
    format: ".Status"
    alias: BACKEND_STATUS

hosts:
  - fetch: HOST_IP
    type: ip

