ui:
  # @description Host port for the RAG UI. If unspecified, a random available port is assigned. Specify a port number to use a custom value.
  port: ""
  # @hidden
  image: icr.io/ai-services-cicd/rag-ui:v0.0.28

backend:
  # @description Host port for the OpenAI-compatible RAG service. Defaults to unexposed; assign a port to enable external access.
  port: "0"
  # @hidden
  image: icr.io/ai-services-cicd/rag:v0.0.86
  # @hidden
  log_level: "INFO"

opensearch:
  auth:
    # @description Username for OpenSearch authentication. Default is 'admin'.
    username: "admin"
    # @description Password for OpenSearch authentication. Must be at least 15 characters and contain at least one uppercase letter, one lowercase letter, one digit, and one special character. Avoid common words, predictable patterns, or dictionary terms. Use this to override the default admin password.
    password: "AiServices@12345"

