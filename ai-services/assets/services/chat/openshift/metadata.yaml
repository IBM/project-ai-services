name: chat
version: "1.0.0"
runtime: openshift

# Resource requirements for OpenShift runtime
requirements:
  min_cpu: "2"
  min_memory: "4Gi"
  min_disk: "20Gi"

# Helm chart configuration
chart_templates:
  - name: backend-deployment
    template: backend-deployment.yaml
  - name: backend-service
    template: backend-service.yaml
  - name: backend-route
    template: backend-route.yaml
  - name: ui-deployment
    template: ui-deployment.yaml
  - name: ui-service
    template: ui-service.yaml
  - name: ui-route
    template: ui-route.yaml

# Made with Bob
