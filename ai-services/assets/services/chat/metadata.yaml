# Service identification
id: chat
name: "Question and Answer"
description: "Answer questions in natural language by sourcing general & domain-specific knowledge"
type: service

# Certification and support
certified_by: "IBM"

# Service belongs to these architectures
architectures:
  - rag

# Dependencies on other components
dependencies:
  - id: vector_store
  - id: embedding
  - id: llm
  - id: reranker

# Resource requirements (UI + Backend)
resources:
  cpu: 1 # 50m (UI) + 1 (Backend) = ~1 core
  memory: 1536 # 512Mi (UI) + 1Gi (Backend) = 1.5Gi in MB
