name: opensearch
version: "1.0.0"
runtime: podman

# Resource requirements for Podman runtime
requirements:
  min_cpu: "2"
  min_memory: "8Gi"
  min_disk: "50Gi"

# Pod template execution order
pod_templates:
  - name: opensearch
    template: opensearch.yaml.tmpl
    wait_for_ready: true
    readiness_timeout: 300s

