name: instruct
version: "1.0.0"
runtime: openshift

# Resource requirements for OpenShift runtime (with GPU)
requirements:
  min_cpu: "12"
  min_memory: "150Gi"
  min_spyre: "4"
  min_disk: "50Gi"

# Helm chart configuration
chart_templates:
  - name: instruct-inferenceservice
    template: instruct-inferenceservice.yaml

