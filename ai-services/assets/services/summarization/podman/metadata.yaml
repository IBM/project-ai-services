name: summarization
version: "1.0.0"
runtime: podman

# Resource requirements for Podman runtime
requirements:
  min_cpu: "1"
  min_memory: "1Gi"
  min_disk: "10Gi"

# Pod template execution order
pod_templates:
  - name: summarize-api
    template: summarize-api.yaml.tmpl
    wait_for_ready: true
    readiness_timeout: 300s

