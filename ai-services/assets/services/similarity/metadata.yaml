# Service identification
id: similarity
name: "Similarity Search"
description: "Finds semantically similar content using embeddings and reranking"
type: service

# Certification and support
certified_by: "IBM"

# Service belongs to these architectures
architectures:
  - rag

# Dependencies on other components
dependencies:
  - id: vector_store
  - id: embedding
  - id: reranker

# Resource requirements
resources:
  cpu: 1 # 1 core (rounded up from 500m in OpenShift template)
  memory: 1024 # 1Gi in MB based on podman template limits


