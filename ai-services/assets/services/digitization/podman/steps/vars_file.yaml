pods:
  - name: "{{ .AppName }}--digitization"
    format: "index .Ports \"4000/tcp\" 0"
    default: ""
    alias: DIGITIZE_API_PORT

  - name: "{{ .AppName }}--digitization"
    format: "index .Ports \"4001/tcp\" 0"
    default: ""
    alias: DIGITIZE_UI_PORT

containers:
  - name: "{{ .AppName }}--digitization-ui"
    format: ".Status"
    alias: DIGITIZE_UI_STATUS

  - name: "{{ .AppName }}--digitization-backend-server"
    format: ".Status"
    alias: DIGITIZE_API_STATUS

hosts:
  - fetch: HOST_IP
    type: ip

