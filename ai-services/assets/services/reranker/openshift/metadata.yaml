name: reranker
version: "1.0.0"
runtime: openshift

# Resource requirements for OpenShift runtime (with GPU)
requirements:
  min_cpu: "4"
  min_memory: "8Gi"
  min_spyre: "1"
  min_disk: "20Gi"

# Helm chart configuration
chart_templates:
  - name: reranker-inferenceservice
    template: reranker-inferenceservice.yaml

