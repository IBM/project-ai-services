ui:
  port: ""
  image: icr.io/ai-services-cicd/catalog-ui:v0.0.3

backend:
  port: ""
  image: icr.io/ai-services-cicd/ai-services:0.0.3
  runtime: ""
  adminPasswordHash: ""
  podman:
    uri: "/run/podman/podman.sock"

db:
  port: ""
  image: icr.io/ai-services-private/postgres:18
  user: "admin"
  database: "ai_services"
  password: ""
  dataPath: "/var/lib/ai-services/db"
  resources:
    requests:
      memory: "512Mi"
    limits:
      memory: "1Gi"

caddy:
  image: "docker.io/library/caddy:2.8-alpine"
  httpsPort: 443
  serverName: "ai_services_server"
  dataPath: "/var/lib/ai-services/catalog/caddy"
  domain: ""  # Will be set by configure command
  externalPort: 443  # Will be set by configure command
