apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-services-sa
  namespace: ai-services
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-services-manager
rules:
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Required by GetSystemInfo / getSpyreCardInfo to read node capacity and allocatable resources.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-services-manager-binding
subjects:
  - kind: ServiceAccount
    name: ai-services-sa
    namespace: ai-services
roleRef:
  kind: ClusterRole
  name: ai-services-manager
  apiGroup: rbac.authorization.k8s.io
---
# Grants the backend SA access to query the OpenShift Thanos Querier (port 9091).
# Without this the Thanos HTTP endpoint returns 403 Forbidden (plain text),
# which causes a JSON parse error in GetSystemInfo.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-services-monitoring-view-binding
subjects:
  - kind: ServiceAccount
    name: ai-services-sa
    namespace: ai-services
roleRef:
  kind: ClusterRole
  name: cluster-monitoring-view
  apiGroup: rbac.authorization.k8s.io
